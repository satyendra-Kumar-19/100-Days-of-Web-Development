<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID and Class Example</title>
  <link rel="stylesheet" href="style.css">
 
</head>
<body>
  <!-- Using ID -->
  <h2 id="main-heading">Learning IDs and Classes</h2>

  <!-- Using Classes -->
  <p class="highlight">This paragraph is highlighted using a class.</p>

  <div class="box">
    <p>This is inside a box styled with the <code>.box</code> class.</p>
  </div>

  <div class="box center-text">
    <p>This box combines two classes: <code>.box</code> and <code>.center-text</code>.</p>
  </div>

  <p>This is a normal paragraph without any class or ID.</p>
</body>
</html>
